<!-- module_app/templates/module_app/attendance/calendar.html -->
{% extends 'module_app/base.html' %}

{% block title %}Календарь посещаемости{% endblock %}

{% block page_heading %}Календарь посещаемости{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.css">
{% endblock %}

{% block content %}
<div class="card shadow">
    <div class="card-header py-3">
        <div class="d-flex justify-content-between align-items-center">
            <h6 class="m-0 font-weight-bold text-primary">Календарь посещаемости</h6>
            <div>
                <select id="employeeSelect" class="form-select form-select-sm">
                    <option value="">Все сотрудники</option>
                    {% for emp in employees %}
                    <option value="{{ emp.id }}">{{ emp.full_name }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>
    </div>
    <div class="card-body">
        <div id="calendar"></div>
    </div>
</div>

{% block extra_js %}
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/locales/ru.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    var calendarEl = document.getElementById('calendar');
    var calendar = new FullCalendar.Calendar(calendarEl, {
        locale: 'ru',
        initialView: 'dayGridMonth',
        headerToolbar: {
            left: 'prev,next today',
            center: 'title',
            right: 'dayGridMonth,timeGridWeek,timeGridDay'
        },
        events: function(info, successCallback, failureCallback) {
            const employeeId = document.getElementById('employeeSelect').value;
            fetch(`/api/v1/attendance/calendar/?start=${info.startStr}&end=${info.endStr}&employee=${employeeId}`)
                .then(response => response.json())
                .then(data => successCallback(data));
        },
        eventClick: function(info) {
            alert('Событие: ' + info.event.title);
        }
    });
    calendar.render();

    document.getElementById('employeeSelect').addEventListener('change', function() {
        calendar.refetchEvents();
    });
});
</script>
{% endblock %}
{% endblock %}
