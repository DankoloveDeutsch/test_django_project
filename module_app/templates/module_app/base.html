<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}HR System{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 250px;
            height: 100%;
            background: #2c3e50;
            color: white;
            padding-top: 20px;
        }
        .sidebar a {
            color: white;
            text-decoration: none;
            display: block;
            padding: 10px 20px;
        }
        .sidebar a:hover {
            background: #34495e;
        }
        .main-content {
            margin-left: 250px;
            padding: 20px;
        }
        .sidebar-header h3 {
            text-align: center;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <h3>HR System</h3>
        </div>
        <a href="{% url 'module_app:dashboard' %}"><i class="fas fa-tachometer-alt"></i> Дашборд</a>
        <a href="{% url 'module_app:employee_list' %}"><i class="fas fa-users"></i> Сотрудники</a>
        <a href="{% url 'module_app:attendance_list' %}"><i class="fas fa-clock"></i> Табель</a>
        <a href="{% url 'module_app:document_list' %}"><i class="fas fa-file-alt"></i> Документы</a>
        <a href="{% url 'module_app:reports' %}"><i class="fas fa-chart-bar"></i> Отчеты</a>
        <a href="{% url 'module_app:settings' %}"><i class="fas fa-cog"></i> Настройки</a>
        <hr>
        <a href="{% url 'module_app:logout' %}"><i class="fas fa-sign-out-alt"></i> Выход</a>
    </div>
    
    <div class="main-content">
        {% block content %}{% endblock %}
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
