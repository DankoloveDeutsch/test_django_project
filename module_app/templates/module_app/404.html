<!-- module_app/templates/module_app/404.html -->
{% extends 'module_app/base.html' %}

{% block title %}Страница не найдена{% endblock %}

{% block content %}
<div class="container text-center py-5">
    <div class="error-page">
        <h1 class="display-1 text-muted">404</h1>
        <div class="mb-4">
            <i class="fas fa-search fa-4x text-muted"></i>
        </div>
        <h3 class="mb-3">Страница не найдена</h3>
        <p class="text-muted mb-4">Извините, запрашиваемая страница не существует или была перемещена.</p>
        <a href="{% url 'module_app:dashboard' %}" class="btn btn-primary">
            <i class="fas fa-home me-2"></i> Вернуться на главную
        </a>
    </div>
</div>
{% endblock %}
